<style>

    background: var(--surface); padding: .9rem 1rem; border-bottom: 1px solid var(--border);

  .stat { text-align: center; }
  .stat-val { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
  .stat-lbl { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }

  .section-title {
    display: flex; align-items: center; gap: .7rem;
    margin: 2rem 0 1rem;
    font-size: 1.15rem; font-weight: 700; color: var(--accent2);
  }
  .section-title span.badge {
    background: var(--accent2); color: #fff;
    font-size: .7rem; padding: .2rem .5rem; border-radius: 99px;
  }

  .difficulty-row { display: flex; align-items: center; gap: .5rem; margin: 1.2rem 0 .5rem; }
  .diff-badge {
    font-size: .7rem; font-weight: 700; padding: .2rem .7rem; border-radius: 99px;
    text-transform: uppercase; letter-spacing: .05em;
  }
  .diff-easy { background: #064e3b; color: #6ee7b7; }
  .diff-medium { background: #451a03; color: #fcd34d; }

  .q-num {

  .q-text { font-size: 1rem; line-height: 1.6; }

  .options { display: flex; flex-direction: column; gap: .55rem; margin-top: .8rem; }
  .opt {
    display: flex; align-items: flex-start; gap: .7rem;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 10px; padding: .75rem 1rem;
    cursor: pointer; transition: border-color .15s, background .15s;
    font-size: .95rem; line-height: 1.5;

  .opt:hover:not(.disabled) { border-color: var(--accent); background: #1a2c40; }

  .opt.wrong   { border-color: var(--wrong) !important;   background: #2d0707 !important; }
  .opt.disabled { cursor: default; }
  .opt-label {
    min-width: 1.5rem; height: 1.5rem; border-radius: 50%;
    border: 1.5px solid var(--muted); display: flex; align-items: center; justify-content: center;
    font-size: .75rem; font-weight: 700; color: var(--muted); flex-shrink: 0;

  .opt.correct .opt-label { border-color: var(--correct); color: var(--correct); }
  .opt.wrong   .opt-label { border-color: var(--wrong);   color: var(--wrong); }

  .feedback {
    display: none; margin-top: 1rem; padding: 1rem 1.1rem;
    border-radius: 10px; font-size: .9rem; line-height: 1.6;
  }
  .feedback.show { display: block; }
  .feedback.correct-fb { background: #052e16; border: 1px solid #166534; }
  .feedback.wrong-fb   { background: #2d0707; border: 1px solid #7f1d1d; }

  .tip-box {
    margin-top: .8rem; padding: .75rem 1rem;
    background: #1c1203; border: 1px solid #78350f;
    border-radius: 8px; font-size: .85rem; color: var(--tip);
  }
  .tip-box::before { content: "💡 Mẹo: "; font-weight: 700; }

  .progress-wrap { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: .6rem 1rem; z-index: 100; }
  .progress-bar { background: var(--border); border-radius: 99px; height: 8px; overflow: hidden; }
  .progress-fill { background: linear-gradient(90deg, #38bdf8, #818cf8); height: 100%; border-radius: 99px; transition: width .4s; }
  .progress-info { display: flex; justify-content: space-between; font-size: .75rem; color: var(--muted); margin-top: .3rem; }

    display: block; margin: 2rem auto 0;
    background: linear-gradient(135deg,#38bdf8,#818cf8); color: #0f172a;
    border: none; border-radius: 10px; padding: .75rem 2rem;
    font-size: 1rem; font-weight: 700; cursor: pointer;
  }

  .icon { font-size: 1.1rem; }
  code { background: #1e293b; padding: .1rem .35rem; border-radius: 4px; font-family: monospace; font-size: .9em; color: #7dd3fc; }
</style>

// ======================= STATE =======================
let done = 0, correct = 0, wrong = 0;
const answered = new Array(questions.length).fill(false);

// ======================= RENDER =======================
function render() {
  const root = document.getElementById('quiz-root');
  root.innerHTML = '';

  let lastSection = null;
  let lastDiff = null;
  let qIdx = 0;

  questions.forEach((q, i) => {
    if (q.section && q.section !== lastSection) {
      const sh = document.createElement('div');
      sh.className = 'section-title';
      sh.innerHTML = `<span class="icon">${q.sectionIcon}</span> ${q.section} <span class="badge">${countSection(q.section)} câu</span>`;
      root.appendChild(sh);
      lastSection = q.section;
      lastDiff = null;
    }

    if (q.difficulty && q.difficulty !== lastDiff) {
      const dr = document.createElement('div');
      dr.className = 'difficulty-row';
      const labels = { easy: '⭐ Dễ', medium: '⭐⭐ Trung bình', hard: '⭐⭐⭐ Khó' };
      const cls = { easy: 'diff-easy', medium: 'diff-medium', hard: 'diff-hard' };
      dr.innerHTML = `<span class="diff-badge ${cls[q.difficulty]}">${labels[q.difficulty]}</span>`;
      root.appendChild(dr);
      lastDiff = q.difficulty;
    }

    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `q${i}`;

    card.innerHTML = `
      <div class="q-header">
        <div class="q-num">${i+1}</div>
        <div class="q-text">${q.q}</div>
      </div>
      <div class="options" id="opts${i}">
        ${q.opts.map((o, j) => `
          <div class="opt" id="opt${i}_${j}" onclick="answer(${i},${j})">
            <div class="opt-label">${String.fromCharCode(65+j)}</div>
            <div>${o}</div>
          </div>`).join('')}
      </div>
      <div class="feedback" id="fb${i}"></div>
    `;
    root.appendChild(card);
  });

  if (typeof MathJax !== 'undefined') MathJax.typesetPromise();
}

function countSection(s) {
  return questions.filter(q => q.section === s || (q.section === null && questions.indexOf(q) > questions.findIndex(qq=>qq.section===s))).length;
}

function answer(qi, choice) {
  if (answered[qi]) return;
  answered[qi] = true;
  done++;

  const q = questions[qi];
  const isCorrect = choice === q.ans;
  if (isCorrect) correct++; else wrong++;

  // Style options
  q.opts.forEach((_, j) => {
    const el = document.getElementById(`opt${qi}_${j}`);
    el.classList.add('disabled');
    if (j === q.ans) el.classList.add('correct');
    else if (j === choice) el.classList.add('wrong');
  });

  // Feedback
  const fb = document.getElementById(`fb${qi}`);
  fb.className = `feedback show ${isCorrect ? 'correct-fb' : 'wrong-fb'}`;
  fb.innerHTML = `
    <strong>${isCorrect ? '✅ Đúng!' : '❌ Sai!'}</strong> Đáp án đúng là <strong>${String.fromCharCode(65+q.ans)}</strong>.<br><br>
    📘 <strong>Giải thích:</strong> ${q.explain}<br>
    <div class="tip-box">${q.tip}</div>
  `;

  updateStats();
  if (typeof MathJax !== 'undefined') MathJax.typesetPromise([fb]);
}

function updateStats() {
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-correct').textContent = correct;
  document.getElementById('s-wrong').textContent = wrong;
  const pct = done > 0 ? Math.round(correct/done*100) : 0;
  document.getElementById('s-score').textContent = pct + '%';
  const fill = Math.round(done/questions.length*100);
  document.getElementById('prog-fill').style.width = fill + '%';
  document.getElementById('prog-text').textContent = `${done} / ${questions.length} câu`;
  document.getElementById('prog-score').textContent = `Điểm: ${pct}%`;
}

function resetQuiz() {
  answered.fill(false);
  done = 0; correct = 0; wrong = 0;
  updateStats();
  render();
}

render();
updateStats();
</script>

<div class="container">
  <button class="reset-btn" onclick="resetQuiz()">🔄 Làm lại từ đầu</button>
</div>
</body>
